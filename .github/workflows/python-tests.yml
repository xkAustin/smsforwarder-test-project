name: python-tests

permissions:
  contents: read

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      UV_PYTHON: python
      TRIGGER_MODE: http

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 安装依赖
      - name: Install uv
        run: |
          python -m pip install -U pip
          pip install uv

      - name: Install deps (uv.lock)
        run: |
          uv sync --frozen

      - name: Run tests (full suite)
        run: |
          mkdir -p reports
          uv run pytest -v \
            --junitxml=reports/junit.xml \
            --html=reports/report.html --self-contained-html

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            reports/
