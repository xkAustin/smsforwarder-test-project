name: python-tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      UV_PYTHON: python

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 安装依赖
      - name: Install uv
        run: |
          python -m pip install -U pip
          pip install uv

      - name: Install deps (uv.lock)
        run: |
          uv sync --frozen

      - name: Start mock server (background)
        run: |
          nohup uv run uvicorn tools.mock_server.app:app --host 127.0.0.1 --port 18080 > mockserver.log 2>&1 &
          # 简单健康检查（最多等 10 秒）
          started=false
          for i in $(seq 1 20); do
            if curl -s http://127.0.0.1:18080/health; then
              started=true
              break
            fi
            sleep 0.5
          done

          if [ "$started" != "true" ]; then
            echo "mock server failed to start"
            exit 1
          fi

      - name: Run tests (exclude e2e & performance)
        run: |
          mkdir -p reports
          uv run pytest -v -m "not e2e and not performance" \
            --junitxml=reports/junit.xml \
            --html=reports/report.html --self-contained-html

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            reports/
            mockserver.log
